version: "3.9"

services:   # <-- TAMBAHKAN TITIK DUA (:) SETELAH 'services'
  nginx:
    build: ./nginx
    container_name: nginx-lb
    ports:
      - "8080:80"
    depends_on:
      - web1
      - web2
      - web3
    networks:
      - frontend

  web1:
    build: ./web1
    container_name: web1
    environment:
      DB_HOST: mysql
      DB_NAME: responsi
      DB_USER: student
      DB_PASS: student123
    depends_on:
      - db
    networks:
      - frontend
      - backend

  web2:
    build: ./web2
    container_name: web2
    environment:
      DB_HOST: db
      DB_NAME: responsi
      DB_USER: student
      DB_PASS: wrongpassword   # <-- INI SENGJA SALAH, jangan diubah!
    depends_on:
      - db
    networks:
      - frontend
      - backend

  web3:
    build: ./web3   # <-- UBAH DARI './web33' KE './web3'
    container_name: web3
    environment:
      DB_HOST: db
      DB_NAME: responsi
      DB_USER: student
      DB_PASS: student123
    depends_on:
      - db
    networks:
      - backend

  db:
    build: ./db
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: responsi
      MYSQL_USER: student
      MYSQL_PASSWORD: student123
    volumes:
      - db-data:/var/lib/mysql   # <-- UBAH DARI 'database-data:' KE 'db-data:'
    networks:
      - backend

volumes:
  db-data:   # <-- UBAH DARI 'database-data:' KE 'db-data:'

networks:
  frontend:
  backend:
